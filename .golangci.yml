version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
  skip-dirs:
    - frontend

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
  settings:
    gosec:
      excludes:
        - G104
        - G304
