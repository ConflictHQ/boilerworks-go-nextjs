run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell

linters-settings:
  gosec:
    excludes:
      - G104 # unhandled errors in deferred calls
      - G304 # file path from variable

issues:
  exclude-dirs:
    - vendor
    - frontend
